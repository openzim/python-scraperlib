name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  run-python-tests:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: install ffmpeg and gifsicle
        run: sudo apt update && sudo apt install ffmpeg gifsicle

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml
          architecture: x64

      - name: Install dependencies (and project)
        run: |
          pip install -U pip
          pip install -e .[test,scripts]

      - name: Run the tests
        run: inv coverage --args "--runslow --runinstalled -vvv"

      - name: Upload coverage report to codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  build_python:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml
          architecture: x64

      - name: Ensure we can build Python targets
        run: |
          pip install -U pip build
          python3 -m build --sdist --wheel

  build_javascript:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@v4
        with:
          node-version-file: 'javascript/package.json'
          registry-url: 'https://registry.npmjs.org'
      - run: yarn install
        working-directory: javascript
      - run: yarn pack
        working-directory: javascript
      - run: npm publish --dry-run --provenance --access public
        working-directory: javascript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
